name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Full install: --omit=optional would also drop the build toolchain's
      # platform binaries (rolldown/esbuild ship them as optional deps).
      # The no-embedder degradation path is covered by tests via ENGRAM_NO_EMBED.
      - run: npm ci
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npx tsc -p src/ui/app/tsconfig.json --noEmit
      - run: npm test
      - run: npm run build
