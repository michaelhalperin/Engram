name: Release

# Publishing is deliberate: push a v* tag (e.g. `git tag v0.3.0 && git push --tags`).
# Needs the NPM_TOKEN repository secret (npm automation token with publish rights).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Tag must match package.json version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          [ "$PKG" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package $PKG"; exit 1; }
      # prepublishOnly runs the build and full test suite before anything ships.
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
